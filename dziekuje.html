<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plany wysłane! ❤️</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .thank-you-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            text-align: center;
            padding: 20px;
        }
        .thank-you-card {
            background-color: #23232a;
            border-top: 6px solid #8a3a54;
            border-radius: 12px;
            padding: 40px;
            max-width: 500px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
        }
        .thank-you-card h2 {
            font-size: 2rem;
            margin-bottom: 15px;
            color: #d67a96;
        }
        .back-button {
            display: inline-block;
            background-color: #8a3a54;
            color: #fff;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: bold;
            margin-top: 25px;
            transition: background-color 0.3s;
        }
        .back-button:hover { background-color: #702f44; }
    </style>
</head>
<body>

<header>
    <h1>Dostałem Twoje plany! 💌</h1>
</header>

<main class="thank-you-container">
    <div class="thank-you-card">
        <h2>Wiadomość wysłana!</h2>
        <p>Już nie mogę się doczekać naszej randki! Miss you so much. Wracaj do mnie jak najszybciej! ❤️</p>
        <img src="https://tenor.com/pl/view/cat-hyppy-gif-9091438043443803258" alt="happy" style="width: 100%; border-radius: 8px; margin-top: 15px;">
        <a href="index.html" class="back-button">Wróć na stronę główną</a>
    </div>
</main>

<footer>
    Zaprojektowane w 100% z tęsknoty dla Weroniki
</footer>

</body>
</html>
