<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dla Weroniki ❤️</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Ciągle w tej Chorwacji! 😘</h1>
    <div id="countdown">Trwa ładowanie licznika...</div>
</header>

<main>
    
    <section class="card">
        <h2>Tęsknię... 🐈</h2>
        <p>Włącz, żeby poczuć klimat:</p>
        <iframe data-testid="embed-iframe" style="border-radius:12px" src="https://open.spotify.com/embed/track/0q6LuUqGLUiCPP1cbdwFs3?utm_source=generator&theme=0&si=2afd0f6986344c82" width="100%" height="352" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
        <img src="1.jpg" alt="photo" class="cat-gif">
    </section>

    <section class="card form-column">
        <h2>Co robimy po powrocie? 🍿</h2>
        
        <form id="randka-form" action="https://formspree.io/f/mgojdwrv" method="POST">
            
            <div class="checkbox-group">
                <input type="checkbox" id="opcja1" name="Wybrane plany" value="Jezioro i mój dom">
                <label for="opcja1">Jezioro i maybe mój dom</label>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="opcja2" name="Wybrane plany" value="Wyjście na kawę i ciastko">
                <label for="opcja2">Wyjście na kawę i ciastko</label>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="opcja3" name="Wybrane plany" value="Głaskanie Lucjana i przytulanie">
                <label for="opcja3">Głaskanie Lucjana i przytulanie</label>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="opcja4" name="Wybrane plany" value="3h opowiadania o Chorwacji w parku">
                <label for="opcja4">3h opowiadania o Chorwacji w parku</label>
            </div>
            
            <label for="custom" class="form-label">Twój własny pomysł:</label>
            <input type="text" id="custom" name="Własny pomysł" placeholder="Napisz mi tutaj...">
            
            <h2 style="margin-top: 30px;">Kiedy randka? 📅</h2>
            <p>Wybierz dzień, w którym jesteś gotowa na nasze wyjście:</p>
            
            <input type="date" id="randka" name="Wybrana data randki" style="width: 100%; box-sizing: border-box; margin-bottom: 20px;" required>
            
            <button type="submit">Wyślij plan prosto do mnie! ❤️</button>
        </form>
    </section>
    
</main>

<footer>
    Zaprojektowane w 100% z tęsknoty dla Weroniki
</footer>

<script src="script.js"></script>

</body>
</html>
