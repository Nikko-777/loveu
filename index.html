<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dla Weroniki ❤️</title>
    <style>
        /* Styl ogólny strony */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fff0f5; /* Delikatny, pastelowy róż */
            color: #1a3c28; /* Ciemna zieleń dla tekstu */
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Nagłówek (Header) */
        header {
            background-color: #2b5329; /* Butelkowa zieleń */
            color: #fff0f5;
            text-align: center;
            padding: 2rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        h1 { margin: 0; font-size: 2.5rem; }
        #countdown { font-size: 1.5rem; margin-top: 10px; font-weight: bold; }
        
        /* Kontener na 3 kolumny */
        main {
            display: flex;
            flex-wrap: wrap; /* Pozwala kolumnom zejść niżej na telefonach */
            justify-content: center;
            gap: 25px;
            padding: 3rem 1rem;
            flex: 1;
        }
        
        /* Wygląd pojedynczej kolumny (Section) */
        section {
            background-color: white;
            border-top: 6px solid #2b5329; /* Akcent z butelkowej zieleni */
            border-radius: 12px;
            padding: 25px;
            width: 320px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.08);
        }
        h2 { color: #2b5329; font-size: 1.5rem; margin-top: 0;}
        
        /* Grafika i formularze */
        .cat-gif {
            width: 100%;
            border-radius: 8px;
            margin-top: 15px;
        }
        form { display: flex; flex-direction: column; gap: 12px; }
        .checkbox-group { display: flex; align-items: center; gap: 8px; }
        
        input[type="text"], input[type="date"] {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-family: inherit;
        }
        
        button {
            background-color: #2b5329;
            color: #fff0f5;
            border: none;
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: background-color 0.3s;
            margin-top: 10px;
        }
        button:hover { background-color: #1e3a1d; } /* Ciemniejsza zieleń po najechaniu */
        
        /* Stopka (Footer) */
        footer {
            text-align: center;
            padding: 1.5rem;
            background-color: #2b5329;
            color: #fff0f5;
            margin-top: auto;
        }
    </style>
</head>
<body>

<!-- WSTĘP -->
<header>
    <h1>Wracaj już do mnie z tej Chorwacji! 🐾</h1>
    <div id="countdown">Trwa ładowanie licznika...</div>
</header>

<!-- GŁÓWNA TREŚĆ -->
<main>
    
    <!-- Kolumna 1: Piosenka i Koty -->
    <section>
        <h2>Tęsknię... 🐈</h2>
        <p>Włącz, żeby poczuć klimat:</p>
        
        <!-- Odtwarzacz Spotify (Przykład, działa od razu!) -->
        <iframe style="border-radius:12px" src="https://open.spotify.com/embed/track/3Zwu2K0Qa5sT6teCCHPShP?utm_source=generator" width="100%" height="152" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
        
        <!-- GIF z kotem -->
        <img src="https://media.giphy.com/media/VbnUQpnihPSIgIXuZv/giphy.gif" alt="Tęskniący kot" class="cat-gif">
    </section>

    <!-- Kolumna 2: Formularz planów -->
    <section>
        <h2>Co robimy po powrocie? 🍿</h2>
        <form>
            <div class="checkbox-group">
                <input type="checkbox" id="opcja1">
                <label for="opcja1">Całodniowy maraton filmowy w łóżku</label>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="opcja2">
                <label for="opcja2">Wyjście na kawę i ciastko</label>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="opcja3">
                <label for="opcja3">Głaskanie kotów i przytulanie</label>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="opcja4">
                <label for="opcja4">3h opowiadania o Chorwacji</label>
            </div>
            
            <label for="custom" style="margin-top: 10px; font-weight:bold; color: #2b5329;">Twój własny pomysł:</label>
            <input type="text" id="custom" placeholder="Wpisz tutaj...">
            
            <button type="button" onclick="alert('Plany zostały zaakceptowane! ❤️')">Wyślij plan!</button>
        </form>
    </section>

    <!-- Kolumna 3: Kalendarz -->
    <section>
        <h2>Kiedy randka? 📅</h2>
        <p>Wybierz dzień, w którym jesteś gotowa na nasze wyjście:</p>
        <form>
            <input type="date" id="randka" style="width: 100%; box-sizing: border-box; margin-bottom: 10px;">
            <button type="button" onclick="alert('Zapisane w moim kalendarzu! 🥰')">Potwierdź termin</button>
        </form>
    </section>
    
</main>

<!-- STOPKA -->
<footer>
    Zaprojektowane w 100% z tęsknoty dla Weroniki | 2026
</footer>

<!-- SKRYPT DO ODLICZANIA CZASU -->
<script>
    // Ustawienie daty powrotu: 15 lipca 2026, godzina 12:00 (możesz zmienić godzinę)
    const returnDate = new Date("Jul 15, 2026 12:00:00").getTime();

    // Funkcja aktualizująca odliczanie co sekundę
    const timer = setInterval(function() {
        const now = new Date().getTime();
        const distance = returnDate - now;

        // Obliczenia matematyczne dla dni, godzin, minut i sekund
        const days = Math.floor(distance / (1000 * 60 * 60 * 24));
        const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((distance % (1000 * 60)) / 1000);

        // Jeśli czas minął
        if (distance < 0) {
            clearInterval(timer);
            document.getElementById("countdown").innerHTML = "Weronika jest już w domu! 🎉";
        } else {
            // Wypisanie wyniku na ekranie
            document.getElementById("countdown").innerHTML = "Do powrotu: " + days + " dni " + hours + " godz " + minutes + " min " + seconds + " sek";
        }
    }, 1000);
</script>

</body>
</html>
